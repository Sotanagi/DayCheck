<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayCheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F2EE;--card:#FFFFFF;--border:rgba(0,0,0,0.08);
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --accent:#2A7A3B;--accent-dim:rgba(42,122,59,0.09);--accent-glow:rgba(42,122,59,0.18);
  --text:#181A17;--muted:rgba(24,26,23,0.45);--danger:#C62828;
  --gold:#8B6914;--gold-dim:rgba(139,105,20,0.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}
body{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.hdr{padding:20px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:10;box-shadow:var(--shadow);}
.hdr-logo{font-family:'Playfair Display',serif;font-size:21px;letter-spacing:-0.5px;color:var(--text);}
.hdr-logo span{color:var(--accent);}
.today-chip{background:var(--accent-dim);border:1px solid rgba(42,122,59,0.2);color:var(--accent);font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;}

nav{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:57px;z-index:9;}
nav button{flex:1;padding:8px 2px;background:transparent;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;position:relative;transition:color .2s,background .2s;}
nav button.active{color:var(--text);background:var(--bg);}
nav button.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:14px;height:2px;border-radius:2px;background:var(--accent);}

.screen{display:none;padding:14px 16px 100px;flex-direction:column;gap:12px;}
.screen.show{display:flex;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.hero-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow),transparent 70%);pointer-events:none;}
.hero-greet{font-size:12px;color:var(--muted);margin-bottom:4px;}
.hero-title{font-family:'Playfair Display',serif;font-size:24px;line-height:1.25;margin-bottom:6px;color:var(--text);}
.hero-title em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:13px;color:var(--muted);}

.pr-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.pr-card{flex-shrink:0;width:130px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;box-shadow:var(--shadow);}
.pr-card.gold{border-color:rgba(139,105,20,0.25);background:rgba(139,105,20,0.03);}
.pr-exname{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);line-height:1;}
.pr-val.gold-c{color:var(--gold);}
.pr-sub{font-size:10px;color:var(--muted);margin-top:3px;}

.log-tabs{display:flex;gap:6px;}
.log-tab{flex:1;padding:11px 6px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.log-tab.active{color:var(--accent);border-color:rgba(42,122,59,0.3);background:var(--accent-dim);}

.wizard-step{display:none;}
.wizard-step.active{display:block;}
.card-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

.muscle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.muscle-btn{padding:16px 6px;background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;text-align:center;box-shadow:var(--shadow);}
.mb-icon{font-size:22px;margin-bottom:5px;display:block;}
.mb-name{font-size:12px;font-weight:600;color:var(--text);}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:10px;}

.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;width:100%;box-shadow:var(--shadow);}
.ex-name{font-size:14px;font-weight:500;}
.ex-pr{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-pr.has{color:var(--accent);}

.prev-rec{background:var(--accent-dim);border:1px solid rgba(42,122,59,0.18);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.prec-label{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;}
.prec-val{font-size:20px;color:var(--accent);font-weight:bold;}

.input-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.input-group{display:flex;flex-direction:column;gap:4px;}
.input-group label{font-size:10px;font-weight:600;color:var(--muted);}
.inp{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 8px;font-size:20px;font-weight:600;text-align:center;width:100%;}
.inp-txt{font-size:14px;text-align:left;}

.walk-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.calc-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.calc-val{font-size:24px;color:var(--accent);font-weight:bold;}

.save-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;}

.chat-topbar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
.chat-select{padding:5px; border-radius:8px; border:1px solid var(--border); background:var(--bg); font-size:13px;}
.chip-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;padding:5px 10px;border-radius:7px;}

.chat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;min-height:240px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow);}
.chat-msg{display:flex;flex-direction:column;gap:2px;}
.chat-msg.mine{align-items:flex-end;}
.chat-msg.other{align-items:flex-start;}
.msg-name{font-size:10px;color:var(--muted);font-weight:600;}
.msg-bubble{padding:9px 13px;border-radius:13px;max-width:82%;font-size:13px;color:var(--text);}
.chat-msg.mine .msg-bubble{background:var(--accent-dim);border:1px solid rgba(42,122,59,0.2);}
.chat-msg.other .msg-bubble{background:rgba(0,0,0,0.04);border:1px solid var(--border);}
.msg-time{font-size:10px;color:var(--muted);}

.chat-input-row{display:flex;gap:7px;}
.chat-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-size:13px;}
.send-btn{padding:11px 18px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:13px;}

.feed{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.feed-item{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid var(--border);}
.fi-icon{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--accent-dim);margin-right:11px;}
.fi-name{font-size:13px;font-weight:500;}
.fi-right{margin-left:auto;text-align:right;}
.fi-val{font-size:13px;font-weight:600;color:var(--accent);}
.fi-time{font-size:10px;color:var(--muted);}
.feed-empty{padding:22px;text-align:center;color:var(--muted);font-size:13px;}
.sec-label{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:6px;}

.modal-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.3);}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:28px 22px 36px;width:100%;max-width:430px;}
.modal-sheet h2{font-size:22px;margin-bottom:6px;}
.modal-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:16px;margin-bottom:10px;}

.goal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
.ai-plan { font-size: 13px; color: var(--text); background: var(--accent-dim); padding: 10px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; line-height:1.5; }

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(55px);background:var(--text);color:var(--card);padding:10px 18px;border-radius:12px;font-size:13px;opacity:0;transition:transform .3s,opacity .3s; z-index:999;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">Day<span>Check</span></div>
  <div class="today-chip" id="todayChip">🎯 今日の記録は？</div>
</header>

<nav>
  <button id="nt-home" class="active" onclick="showScreen('home')">ホーム</button>
  <button id="nt-log" onclick="showScreen('log')">記録</button>
  <button id="nt-chat" onclick="showScreen('chat')">チャット</button>
  <button id="nt-hist" onclick="showScreen('hist')">履歴</button>
</nav>

<div id="home" class="screen show">
  <div class="hero-card">
    <div class="hero-greet" id="heroGreet">おはようございます 👋</div>
    <div class="hero-title">前回の<em>自分を超えよう</em></div>
    <div class="hero-sub" id="heroSub">記録を読み込み中...</div>
　　<div id="graphContainer" style="margin-top:20px; background: rgba(255,255,255,0.5); padding:15px; border-radius:15px;">
  <canvas id="mixedChart"></canvas>
  
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;" id="chartControls">
    <label style="font-size:11px; display:flex; align-items:center; gap:4px;">
      <input type="checkbox" checked onchange="toggleDataset(0)"> 体重
    </label>
    <label style="font-size:11px; display:flex; align-items:center; gap:4px;">
      <input type="checkbox" checked onchange="toggleDataset(1)"> 筋トレ(RM)
    </label>
    <label style="font-size:11px; display:flex; align-items:center; gap:4px;">
      <input type="checkbox" checked onchange="toggleDataset(2)"> ウォーキング
    </label>
  </div>
</div>
  </div>

  <div class="feed" style="padding:16px;text-align:center;">
    <div class="sec-label" style="margin-bottom:8px;">連続記録（Streak）</div>
    <div id="streakNum" style="font-size:34px;font-weight:700;color:var(--accent);">0日</div>
    <div style="font-size:12px;color:var(--muted);">継続中 🔥</div>
  </div>

  <div class="goal-box">
    <div class="sec-label" style="margin-bottom:8px;">目標 ＆ AIプランニング</div>
    <input type="text" id="goalInp" class="inp inp-txt" placeholder="例：夏までに5kg痩せたい" style="margin-bottom:8px;">
    <button class="save-btn" id="aiBtn" onclick="getAIPlan()" style="padding:10px; font-size:13px; background:#181A17;">AIにプランを提案してもらう</button>
    <div id="aiPlanResult"></div>
  </div>

  <div>
    <div class="sec-label">自己ベスト</div>
    <div class="pr-scroll" id="prScroll"><div style="color:var(--muted);font-size:13px;">読み込み中...</div></div>
  </div>
  <div>
    <div class="sec-label">最近の活動</div>
    <div class="feed" id="recentFeed"><div class="feed-empty">記録がありません</div></div>
  </div>
</div>

<div id="log" class="screen">
  <div class="log-tabs">
    <button class="log-tab active" id="tab-s" onclick="switchLog('strength')">💪 筋トレ</button>
    <button class="log-tab" id="tab-w" onclick="switchLog('walk')">🚶 ウォーク</button>
    <button class="log-tab" id="tab-o" onclick="switchLog('other')">✏️ その他</button>
  </div>

  <div id="sPanel">
    <div class="wizard-step active" id="ws0">
      <div class="card-label">部位を選ぶ</div>
      <div class="muscle-grid">
        <button class="muscle-btn" onclick="pickMuscle('胸')"><span class="mb-icon">🫁</span><span class="mb-name">胸</span></button>
        <button class="muscle-btn" onclick="pickMuscle('背中')"><span class="mb-icon">🏋️</span><span class="mb-name">背中</span></button>
        <button class="muscle-btn" onclick="pickMuscle('脚')"><span class="mb-icon">🦵</span><span class="mb-name">脚</span></button>
        <button class="muscle-btn" onclick="pickMuscle('肩')"><span class="mb-icon">🤸</span><span class="mb-name">肩</span></button>
        <button class="muscle-btn" onclick="pickMuscle('腕')"><span class="mb-icon">💪</span><span class="mb-name">腕</span></button>
        <button class="muscle-btn" onclick="pickMuscle('体幹')"><span class="mb-icon">⚡</span><span class="mb-name">体幹</span></button>
      </div>
    </div>
    <div class="wizard-step" id="ws1">
      <button class="back-btn" onclick="goWS(0)">← 戻る</button>
      <div class="card-label" id="ws1Label">種目を選ぶ</div>
      <div class="ex-list" id="exList"></div>
    </div>
    <div class="wizard-step" id="ws2">
      <button class="back-btn" onclick="goWS(1)">← 戻る</button>
      <div class="card-label" id="ws2Label"></div>
      <div class="prev-rec empty" id="sPrevRec">
        <div>
          <div class="prec-label">前回の自己ベスト</div>
          <div class="prec-val none" id="sPrevVal">記録なし</div>
        </div>
        <div style="font-size:26px;">✨</div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>重量 kg</label><input class="inp" type="number" id="inW"></div>
        <div class="input-group"><label>回数</label><input class="inp" type="number" id="inR"></div>
        <div class="input-group"><label>セット</label><input class="inp" type="number" id="inS"></div>
      </div>
      <button class="save-btn" onclick="saveStrength()">記録する</button>
    </div>
  </div>

  <div id="wPanel" style="display:none;">
    <div class="walk-row">
      <div class="input-group"><label>距離 km</label><input class="inp" type="number" id="wDist"></div>
      <div class="input-group"><label>時間 分</label><input class="inp" type="number" id="wTime"></div>
    </div>
    <button class="save-btn" onclick="saveWalk()">記録する</button>
  </div>

  <div id="oPanel" style="display:none;">
    <div class="input-group" style="margin-bottom:10px;"><label>活動名</label><input class="inp inp-txt" type="text" id="oAct" placeholder="例：ヨガ、水泳、掃除"></div>
    <div class="input-group" style="margin-bottom:10px;"><label>詳細（時間や感想など）</label><input class="inp inp-txt" type="text" id="oDet" placeholder="30分頑張った！"></div>
    <button class="save-btn" onclick="saveOther()">記録する</button>
  </div>
</div>

<div id="chat" class="screen">
  <div class="chat-topbar">
    <div>
      <select id="grpSelect" class="chat-select" onchange="changeGroup()"></select>
    </div>
    <div class="topbar-btns">
      <button class="chip-btn" onclick="openGroupModal()">➕ グループ作成/参加</button>
      <button class="chip-btn" onclick="openNameModal()">👤 名前変更</button>
    </div>
  </div>
  <div class="chat-box" id="chatBox"><div class="feed-empty">グループを選択してください</div></div>
  <div class="chat-input-row">
    <input class="chat-inp" id="chatInp" placeholder="メッセージを送る..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="send-btn" onclick="sendChat()">送信</button>
  </div>
</div>

<div id="hist" class="screen">
  <div class="feed" id="historyFeed"><div class="feed-empty">読み込み中...</div></div>
</div>

<div class="modal-overlay" id="nameModal">
  <div class="modal-sheet">
    <h2>名前の設定</h2>
    <input class="modal-inp" id="nameInp" placeholder="表示名">
    <button class="save-btn" onclick="saveName()">決定</button>
  </div>
</div>

<div class="modal-overlay" id="groupModal">
  <div class="modal-sheet">
    <h2>グループに参加・作成</h2>
    <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">IDを「streak」にすると連続記録が自動共有されます！</p>
    <input class="modal-inp" id="grpNameInp" placeholder="グループ名">
    <input class="modal-inp" id="grpIdInp" placeholder="お好きなグループID（英数字）">
    <button class="save-btn" onclick="joinGroup()">参加・作成する</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// --- Supabase 初期化 ---
const SUPABASE_URL = "https://jfdbbtvnegiqmdywtcbt.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_xnCF0lig_GYq5aw2TTzGgQ_6NRyRIyW";

let db = null;
try {
  if (SUPABASE_URL && SUPABASE_KEY && window.supabase) {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch (e) {
  console.warn("Supabaseの初期化に失敗しました", e);
}

// --- 状態管理 ---
let userId = localStorage.getItem("uid") || (() => { const id = crypto.randomUUID(); localStorage.setItem("uid",id); return id; })();
let displayName = localStorage.getItem("displayName") || "ゲスト";
let myGroups = JSON.parse(localStorage.getItem('myGroups') || '[]');
let currentGroupId = myGroups.length > 0 ? myGroups[0].id : null;

let pBests = {}, walkBest = null;
let curMuscle = "", curExercise = "", chatSub = null;

const EX = {
  '胸':  ['ベンチプレス','ダンベルフライ','プッシュアップ'],
  '背中': ['デッドリフト','ラットプルダウン','ベントオーバーロウ'],
  '脚':  ['スクワット','レッグプレス','ランジ'],
  '肩':  ['ショルダープレス','サイドレイズ','フロントレイズ'],
  '腕':  ['バーベルカール','トライセップスプレスダウン'],
  '体幹': ['プランク','クランチ','レッグレイズ'],
};

let customExercises = JSON.parse(localStorage.getItem('customExercises') || '{}');

Object.keys(customExercises).forEach(muscle => {
  if (!EX[muscle]) EX[muscle] = [];

  customExercises[muscle].forEach(ex => {
    if (!EX[muscle].includes(ex)) {
      EX[muscle].push(ex);
    }
  });
});

function escapeHTML(text) {
  return String(text).replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

const MICON = {'胸':'🫁','背中':'🏋️','脚':'🦵','肩':'🤸','腕':'💪','体幹':'⚡'};

// --- 起動時処理 ---
(async () => {
  setGreeting();
  updateGroupSelect();

  await Promise.all([loadPBests(), loadWalkBest()]);
  renderHome();
  calcStreak();

  await initChart();

  if (currentGroupId) loadChat();
})();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('show');
  document.getElementById('nt-' + id).classList.add('active');
  if (id === 'hist') loadHistory();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  setTimeout(() => t.className = '', 3000);
}
function setGreeting() {
  const h = new Date().getHours();
  document.getElementById('heroGreet').textContent = h < 12 ? 'おはようございます 🌅' : h < 18 ? 'こんにちは ☀️' : 'こんばんは 🌙';
}

// --- グループ・名前管理 ---
function openNameModal() { document.getElementById('nameInp').value = displayName; document.getElementById('nameModal').classList.add('show'); }
function saveName() {
  displayName = document.getElementById('nameInp').value.trim() || 'ゲスト';
  localStorage.setItem('displayName', displayName);
  document.getElementById('nameModal').classList.remove('show');
  toast('名前を保存しました');
}
function openGroupModal() { document.getElementById('groupModal').classList.add('show'); }
function joinGroup() {
  const name = document.getElementById('grpNameInp').value.trim();
  const id = document.getElementById('grpIdInp').value.trim();
  if(!name || !id) return toast('両方入力してください');
  
  if(!myGroups.find(g => g.id === id)) {
    myGroups.push({id, name});
    localStorage.setItem('myGroups', JSON.stringify(myGroups));
  }
  currentGroupId = id;
  updateGroupSelect();
  document.getElementById('groupModal').classList.remove('show');
  loadChat();
  toast('グループに参加しました');
}
function changeGroup() {
  currentGroupId = document.getElementById('grpSelect').value;
  loadChat();
}
function updateGroupSelect() {
  const sel = document.getElementById('grpSelect');
  if(myGroups.length === 0) sel.innerHTML = '<option value="">未参加</option>';
  else sel.innerHTML = myGroups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
  sel.value = currentGroupId;
}

// --- 記録ロード＆保存 ---
async function loadPBests() {
  const { data } = await db.from('strength_logs').select('*').eq('user_id', userId);
  pBests = {};
  (data || []).forEach(r => {
    if (!pBests[r.exercise] || r.weight_kg > pBests[r.exercise].maxWeight) {
      pBests[r.exercise] = { maxWeight: r.weight_kg, reps: r.reps, sets: r.sets };
    }
  });
}
async function loadWalkBest() {
  const { data } = await db.from('walk_logs').select('*').eq('user_id', userId);
  if (data && data.length) {
    walkBest = { distance_km: Math.max(...data.map(r => r.distance_km)) };
  }
}
function renderHome() {
  const scroll = document.getElementById('prScroll');
  let cards = [];
  if (walkBest) cards.push(`<div class="pr-card gold"><div class="pr-exname">🚶 ウォーク</div><div class="pr-val">${walkBest.distance_km} km</div></div>`);
  Object.entries(pBests).forEach(([ex, b]) => cards.push(`<div class="pr-card"><div class="pr-exname">${ex}</div><div class="pr-val">${b.maxWeight} kg</div></div>`));
  scroll.innerHTML = cards.length ? cards.join('') : '<div style="font-size:12px;color:gray;">記録なし</div>';
}

function switchLog(tab) {
  ['s','w','o'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.remove('active');
    document.getElementById(`${t}Panel`).style.display = 'none';
  });
  document.getElementById(`tab-${tab[0]}`).classList.add('active');
  document.getElementById(`${tab[0]}Panel`).style.display = 'block';
}

function goWS(n) { document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active')); document.getElementById('ws'+n).classList.add('active'); }
function pickMuscle(m) {
  curMuscle = m;
  renderExerciseList();
  goWS(1);
}

function renderExerciseList() {
  document.getElementById('ws1Label').textContent = curMuscle + 'の種目を選ぶ';

  const list = EX[curMuscle] || [];

  const exerciseButtons = list.map(ex => {
    const safeName = escapeHTML(ex);
    const encodedName = encodeURIComponent(ex);

    return `
      <button class="ex-item" onclick="pickExercise(decodeURIComponent('${encodedName}'))">
        <div>
          <div class="ex-name">${safeName}</div>
          <div class="ex-pr ${pBests[ex] ? 'has' : ''}">
            ${pBests[ex] ? '自己ベスト ' + pBests[ex].maxWeight + 'kg' : '記録なし'}
          </div>
        </div>
      </button>
    `;
  }).join('');

  document.getElementById('exList').innerHTML = `
    ${exerciseButtons}

    <div class="ex-item" style="display:block; cursor:default;">
      <div class="ex-name" style="margin-bottom:8px;">種目を追加</div>
      <div style="display:flex; gap:7px;">
        <input id="newExInp" class="inp inp-txt" type="text" placeholder="例：インクラインベンチ">
        <button class="save-btn" onclick="addCustomExercise()" style="width:auto; padding:10px 13px; font-size:12px;">追加</button>
      </div>
    </div>
  `;
}

function addCustomExercise() {
  const inp = document.getElementById('newExInp');
  const name = inp.value.trim();

  if (!name) return toast('種目名を入力してください');

  if (!EX[curMuscle]) EX[curMuscle] = [];
  if (!customExercises[curMuscle]) customExercises[curMuscle] = [];

  if (EX[curMuscle].includes(name)) {
    return toast('その種目はすでにあります');
  }

  EX[curMuscle].push(name);
  customExercises[curMuscle].push(name);

  localStorage.setItem('customExercises', JSON.stringify(customExercises));

  inp.value = '';
  renderExerciseList();
  toast('種目を追加しました');
}

function pickExercise(ex) {
  curExercise = ex; document.getElementById('ws2Label').textContent = ex;
  document.getElementById('sPrevVal').textContent = pBests[ex] ? `${pBests[ex].maxWeight}kg` : '記録なし';
  goWS(2);
}

async function saveStrength() {
  const w=document.getElementById('inW').value, r=document.getElementById('inR').value, s=document.getElementById('inS').value;
  if(!w||!r||!s) return toast('数値を入力してください');
  await db.from('strength_logs').insert({user_id:userId, muscle_group:curMuscle, exercise:curExercise, weight_kg:w, reps:r, sets:s});
  afterSave();
}
async function saveWalk() {
  const d=document.getElementById('wDist').value, t=document.getElementById('wTime').value;
  if(!d||!t) return toast('数値を入力してください');
  await db.from('walk_logs').insert({user_id:userId, distance_km:d, duration_min:t});
  afterSave();
}
async function saveOther() {
  const a=document.getElementById('oAct').value, d=document.getElementById('oDet').value;
  if(!a) return toast('活動名を入力してください');
  await db.from('other_logs').insert({user_id:userId, activity_name:a, details:d});
  afterSave();
}
async function afterSave() {
  toast('記録しました！');

  await Promise.all([loadPBests(), loadWalkBest()]);
  renderHome();
  calcStreak();

  await refreshChart();

  showScreen('home');
  shareStreakToGroup();
}

// --- 履歴表示 ---
async function loadHistory() {
  const [s,w,o] = await Promise.all([
    db.from('strength_logs').select('*').eq('user_id',userId),
    db.from('walk_logs').select('*').eq('user_id',userId),
    db.from('other_logs').select('*').eq('user_id',userId)
  ]);
  let items = [...(s.data||[]).map(x=>({...x, t:'💪 '+x.exercise})), ...(w.data||[]).map(x=>({...x, t:'🚶 ウォーク'})), ...(o.data||[]).map(x=>({...x, t:'✏️ '+x.activity_name}))];
  items.sort((a,b) => new Date(b.logged_at) - new Date(a.logged_at));
  
  const box = document.getElementById('historyFeed');
  box.innerHTML = items.length ? items.map(i => `<div class="feed-item"><div class="fi-name">${i.t}</div><div class="fi-time" style="margin-left:auto;">${i.logged_at.split('T')[0]}</div></div>`).join('') : '<div class="feed-empty">記録なし</div>';
}

// --- Streak 自動計算 & 共有 ---
async function calcStreak() {
  const { data } = await db.from('strength_logs').select('logged_at').eq('user_id',userId).order('logged_at', {ascending:false});
  // 簡易的に件数を表示（本来は日付で連続判定するが、今回はログ件数ベースの簡易版）
  const uniqueDays = new Set((data||[]).map(d => d.logged_at.split('T')[0])).size;
  document.getElementById('streakNum').innerText = uniqueDays + '日';
  document.getElementById('todayChip').innerText = `✅ 累計 ${uniqueDays}日`;
}

async function shareStreakToGroup() {
  const strk = document.getElementById('streakNum').innerText;
  const streakGrp = myGroups.find(g => g.id === 'streak');
  if(streakGrp && strk !== '0日') {
    await db.from('chat_messages').insert({ group_id: 'streak', user_id: userId, user_name: displayName, message: `🎉 今日の記録完了！連続記録: ${strk} 🔥`});
  }
}

// --- チャット機能 ---
async function loadChat() {
  if(!currentGroupId) return;
  const { data } = await db.from('chat_messages').select('*').eq('group_id', currentGroupId).order('created_at', {ascending:true});
  const box = document.getElementById('chatBox');
  box.innerHTML = (data||[]).map(m => `
    <div class="chat-msg ${m.user_id === userId ? 'mine' : 'other'}">
      <div class="msg-name">${m.user_name}</div>
      <div class="msg-bubble">${m.message}</div>
    </div>
  `).join('');
  box.scrollTop = box.scrollHeight;
}
async function sendChat() {
  if(!currentGroupId) return toast('グループを選択してください');
  const inp = document.getElementById('chatInp');
  if(!inp.value.trim()) return;
  await db.from('chat_messages').insert({group_id: currentGroupId, user_id: userId, user_name: displayName, message: inp.value});
  inp.value = ''; loadChat();
}

// --- AI目標プラン提案 ---
async function getAIPlan() {
  const goal = document.getElementById("goalInp").value;

  if (!goal) {
    toast("目標を入力してください");
    return;
  }

  const btn = document.getElementById("aiBtn");
  const result = document.getElementById("aiPlanResult");

  btn.textContent = "AIが考え中...";
  btn.disabled = true;
  result.innerHTML = "";

  try {
    const res = await fetch("/api/gemini", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ goal })
    });

    const data = await res.json();

    if (!res.ok) {
      result.innerHTML =
        `<div class="ai-plan">エラー: ${data.error}</div>`;
      return;
    }

    result.innerHTML =
      `<div class="ai-plan">${data.plan}</div>`;

  } catch (e) {
    result.innerHTML =
      `<div class="ai-plan">通信エラー: ${e.message}</div>`;
  }

  btn.textContent = "AIにプランを提案してもらう";
  btn.disabled = false;
}

let mixedChart;

// Supabaseの記録からグラフ用データを作る
async function getGraphData() {
  if (!db) {
    return { labels: [], bodyWeight: [], strength: [], walk: [] };
  }

  const [sRes, wRes] = await Promise.all([
    db.from('strength_logs').select('*').eq('user_id', userId).order('logged_at', { ascending: true }),
    db.from('walk_logs').select('*').eq('user_id', userId).order('logged_at', { ascending: true })
  ]);

  const byDate = {};

  (sRes.data || []).forEach(r => {
    if (!r.logged_at) return;

    const date = r.logged_at.split('T')[0];
    const weight = Number(r.weight_kg) || 0;
    const reps = Number(r.reps) || 0;

    // 推定1RM = 重量 × (1 + 回数 / 30)
    const rm = Math.round(weight * (1 + reps / 30) * 10) / 10;

    if (!byDate[date]) byDate[date] = { strength: 0, walk: 0 };
    byDate[date].strength = Math.max(byDate[date].strength, rm);
  });

  (wRes.data || []).forEach(r => {
    if (!r.logged_at) return;

    const date = r.logged_at.split('T')[0];
    const dist = Number(r.distance_km) || 0;

    if (!byDate[date]) byDate[date] = { strength: 0, walk: 0 };
    byDate[date].walk += dist;
  });

  const dates = Object.keys(byDate).sort();

  return {
    labels: dates.map(d => {
      const parts = d.split('-');
      return `${Number(parts[1])}/${Number(parts[2])}`;
    }),
    bodyWeight: dates.map(() => null),
    strength: dates.map(d => byDate[d].strength || 0),
    walk: dates.map(d => Math.round((byDate[d].walk || 0) * 10) / 10)
  };
}

// グラフの初期化
async function initChart() {
  const canvas = document.getElementById('mixedChart');
  if (!canvas || !window.Chart) return;

  canvas.parentElement.style.height = '260px';

  const ctx = canvas.getContext('2d');
  const graph = await getGraphData();

  mixedChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: graph.labels,
      datasets: [
        {
          label: '体重(kg)',
          data: graph.bodyWeight,
          borderColor: '#C62828',
          backgroundColor: 'rgba(198,40,40,0.12)',
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'y'
        },
        {
          label: '筋トレ(RM)',
          data: graph.strength,
          borderColor: '#2A7A3B',
          backgroundColor: 'rgba(42,122,59,0.12)',
          tension: 0.3,
          yAxisID: 'y1'
        },
        {
          label: 'ウォーキング(km)',
          data: graph.walk,
          backgroundColor: 'rgba(42,122,59,0.2)',
          borderColor: '#2A7A3B',
          borderWidth: 1,
          type: 'bar',
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false
      },
      scales: {
        y: {
          type: 'linear',
          position: 'left',
          title: { display: true, text: '体重 kg' }
        },
        y1: {
          type: 'linear',
          position: 'right',
          grid: { drawOnChartArea: false },
          title: { display: true, text: 'RM / km' }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

// 記録を保存したあとにグラフを更新する
async function refreshChart() {
  if (!mixedChart) return;

  const graph = await getGraphData();

  mixedChart.data.labels = graph.labels;
  mixedChart.data.datasets[0].data = graph.bodyWeight;
  mixedChart.data.datasets[1].data = graph.strength;
  mixedChart.data.datasets[2].data = graph.walk;

  mixedChart.update();
}

// チェックボックスで表示・非表示を切り替える
function toggleDataset(index) {
  if (!mixedChart) return;

  const isVisible = mixedChart.isDatasetVisible(index);

  if (isVisible) {
    mixedChart.hide(index);
  } else {
    mixedChart.show(index);
  }
}

// データセットの表示・非表示切り替え（自律性のための機能）
function toggleDataset(index) {
  if (!mixedChart) return;

  const isVisible = mixedChart.isDatasetVisible(index);
  if (isVisible) {
    mixedChart.hide(index);
  } else {
    mixedChart.show(index);
  }
}
